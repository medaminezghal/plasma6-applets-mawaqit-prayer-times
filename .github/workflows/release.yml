name: Release

on:
  push:
    branches: [main]
    paths: ['version.txt']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PKGNAME: plasma-mawaqit-prayer-times

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Own step, unconditional. Do NOT fold this into a step that can
      # early-exit: `git commit` and `git tag -a` both need an identity.
      - name: Configure git identity
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read and validate version
        id: v
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < version.txt)"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error file=version.txt::'$VERSION' is not x.y.z"
            exit 1
          fi
          TAG="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error file=version.txt::tag $TAG already exists — bump version.txt"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Sync metadata.json (kpackagetool6 --upgrade compares KPlugin.Version)
        run: |
          set -euo pipefail
          python3 - "${{ steps.v.outputs.version }}" <<'PY'
          import json, pathlib, sys
          version = sys.argv[1]
          p = pathlib.Path("package/metadata.json")
          meta = json.loads(p.read_text(encoding="utf-8"))
          if meta["KPlugin"].get("Version") != version:
              meta["KPlugin"]["Version"] = version
              p.write_text(json.dumps(meta, indent=4, ensure_ascii=False) + "\n",
                           encoding="utf-8")
              print("metadata.json updated")
          else:
              print("metadata.json already in sync")
          PY

      - name: Commit metadata.json if it changed
        run: |
          set -euo pipefail
          if git diff --quiet -- package/metadata.json; then
            echo "nothing to commit"
            exit 0
          fi
          git add package/metadata.json
          git commit -m "chore: sync metadata.json to ${{ steps.v.outputs.version }}"
          git push

      - name: Build .plasmoid
        id: build
        run: |
          set -euo pipefail
          ASSET="${PKGNAME}-${{ steps.v.outputs.version }}.plasmoid"
          # metadata.json and contents/ must sit at the archive ROOT: kpackage
          # only descends into a single top-level directory, never two entries.
          ( cd package && zip -r -X -q "../$ASSET" metadata.json contents -x '.*' '*/.*' )
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Verify the artifact
        run: |
          set -euo pipefail
          ASSET="${{ steps.build.outputs.asset }}"
          # Read the zip from Python. Piping `unzip -p` into `python3 -` does not
          # work: the heredoc owns stdin, so the pipe is silently discarded.
          python3 - "$ASSET" "${{ steps.v.outputs.version }}" <<'PY'
          import json, sys, zipfile
          asset, want = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(asset) as z:
              bad = z.testzip()
              assert bad is None, f"corrupt entry: {bad}"
              roots = sorted({n.split("/")[0] for n in z.namelist()})
              assert roots == ["contents", "metadata.json"], f"bad zip root: {roots}"
              m = json.loads(z.read("metadata.json"))["KPlugin"]
          assert m["Version"] == want, f'Version {m["Version"]} != {want}'
          assert m.get("Id"), "KPlugin.Id missing — kpackagetool6 would reject this"
          print("ok:", m["Id"], m["Version"])
          PY
          {
            echo "### \`$ASSET\`"
            echo '```'
            sha256sum "$ASSET"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.v.outputs.tag }}"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --verify-tag \
            --title "$TAG" \
            --generate-notes \
            "${{ steps.build.outputs.asset }}"
