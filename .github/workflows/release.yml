name: Release

on:
  push:
    branches: [main]
    paths: ['version.txt']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PKGNAME: plasma-mawaqit-prayer-times

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate version
        id: v
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < version.txt)"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error file=version.txt::'$VERSION' is not x.y.z"
            exit 1
          fi
          TAG="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error file=version.txt::tag $TAG already exists — bump version.txt"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check metadata.json is in sync
        run: |
          set -euo pipefail
          python3 - "${{ steps.v.outputs.version }}" <<'PY'
          import json, pathlib, sys
          want = sys.argv[1]
          got = json.loads(pathlib.Path("package/metadata.json")
                           .read_text(encoding="utf-8"))["KPlugin"].get("Version")
          if got != want:
              print(f"::error file=package/metadata.json::KPlugin.Version is '{got}' but "
                    f"version.txt says '{want}'. kpackagetool6 --upgrade compares "
                    f"KPlugin.Version, so both must match. Run ./bump.sh {want}")
              sys.exit(1)
          print(f"in sync: {got}")
          PY

      - name: Build .plasmoid
        id: build
        run: |
          set -euo pipefail
          ASSET="${PKGNAME}-${{ steps.v.outputs.version }}.plasmoid"
          # metadata.json and contents/ must sit at the archive ROOT: kpackage
          # only descends into a single top-level directory, never two entries.
          ( cd package && zip -r -X -q "../$ASSET" metadata.json contents -x '.*' '*/.*' )
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Verify the artifact
        run: |
          set -euo pipefail
          ASSET="${{ steps.build.outputs.asset }}"
          # Read the zip from Python. Piping `unzip -p` into `python3 -` does not
          # work: the heredoc owns stdin, so the pipe is silently discarded.
          python3 - "$ASSET" "${{ steps.v.outputs.version }}" <<'PY'
          import json, sys, zipfile
          asset, want = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(asset) as z:
              bad = z.testzip()
              assert bad is None, f"corrupt entry: {bad}"
              roots = sorted({n.split("/")[0] for n in z.namelist()})
              assert roots == ["contents", "metadata.json"], f"bad zip root: {roots}"
              m = json.loads(z.read("metadata.json"))["KPlugin"]
          assert m["Version"] == want, f'Version {m["Version"]} != {want}'
          assert m.get("Id"), "KPlugin.Id missing — kpackagetool6 would reject this"
          print("ok:", m["Id"], m["Version"])
          PY
          {
            echo "### \`$ASSET\`"
            echo '```'
            sha256sum "$ASSET"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create release (gh creates the tag server-side)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # This job performs ZERO git writes: no commit, no tag, no push. gh creates
          # the tag via the API at --target. Nothing for the ruleset to reject, and
          # no git identity is ever needed. (No --verify-tag: it aborts when the tag
          # is ABSENT, which is precisely our case.)
          gh release create "${{ steps.v.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.v.outputs.tag }}" \
            --generate-notes \
            "${{ steps.build.outputs.asset }}"
